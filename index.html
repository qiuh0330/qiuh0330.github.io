<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qiuh0330</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #fff;
    --primary: #4a90d9;
    --primary-dark: #357abd;
    --text: #333;
    --text-light: #666;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-weight: bold;
  }
  .name {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .bio {
    color: var(--text-light);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .link-card {
    display: block;
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--shadow);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }
  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .link-card-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }
  .link-card-title {
    font-size: 18px;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 6px;
  }
  .link-card-desc {
    font-size: 14px;
    color: var(--text-light);
  }
  .link-card-arrow {
    margin-top: 12px;
    font-size: 20px;
    color: var(--primary);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 130px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    text-align: center;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: #eef5ff; color: var(--primary); }
  .footer {
    margin-top: 32px;
    font-size: 13px;
    color: #aaa;
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
  }
  @media (max-width: 480px) {
    .name { font-size: 24px; }
    .link-card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="avatar">Q</div>
  <div class="name">qiuh0330</div>
  <div class="bio">做点有意思的小工具</div>

  <div class="link-card" style="text-align:left;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="link-card-icon" style="margin:0;">🍮</div>
      <div>
        <div class="link-card-title" style="margin:0;">果冻工具</div>
        <div class="link-card-desc">《洛克王国·世界》精灵图鉴 · 图鉴任务 · 精灵蛋组 · 收集管理</div>
      </div>
    </div>
    <div class="btn-row">
      <a href="./roco/index.html" class="btn btn-primary">🌐 在线使用</a>
      <a href="https://github.com/qiuh0330/gdtools/releases/latest/download/gdtools.apk" class="btn btn-ghost">📱 下载安卓 App</a>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/qiuh0330">GitHub</a>
  </div>
</div>
</body>
</html>
